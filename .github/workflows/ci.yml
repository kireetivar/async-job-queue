name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

  steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Set up go
    uses: actions/setup-go@v5
    with:
      go-version: "1.25"
      cache: true
  
  - name: Run Tests
    run: go test ./...  -count=1 
  
