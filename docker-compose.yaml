services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  
  app:
    build: .
    ports:
      - "9090:9090"
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - SERVER_PORT=:9090
      - WORKER_COUNT=10
      - QUEUES=email,mobile
      - SCHEDULE_INTERVAL_SEC=5
      - MAX_PRIORITY=10
      - MAX_RETRIES=10
    depends_on:
      redis:
        condition: service_healthy
  
  prometheus:
    image: "prom/prometheus:latest"
    ports: 
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
  
  grafana:
    image: "grafana/grafana:latest"
    ports: 
      - "3000:3000"
    depends_on:
      - prometheus
  
  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    depends_on:
      - redis

volumes:
  redis_data: